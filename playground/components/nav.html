<script type="module">
  import { context, effect } from "../js/oja.js";

  const [theme] = context("theme");
  const [mobileView] = context("mobile_view");
  const [sidebarOpen] = context("sidebar_open");
  const [files] = context("files");

  const syncDot = find("#sync-dot");
  const themeBtn = find("#theme-btn");
  const mobileBtn = find("#mobile-btn");
  const sidebarBtn = find("#sidebar-btn");

  // Theme icon swap
  effect(() => {
    const dark = theme() === "dark";
    find("#theme-sun", { scope: document }).style.display = dark
      ? "none"
      : "block";
    find("#theme-moon", { scope: document }).style.display = dark
      ? "block"
      : "none";
  });

  // Mobile active state
  effect(() => {
    mobileBtn.classList.toggle("active", mobileView());
  });

  // Sidebar active state
  effect(() => {
    sidebarBtn.classList.toggle("active", sidebarOpen());
  });

  // Sync pulse on file change
  let t;
  effect(() => {
    files();
    syncDot.classList.add("syncing");
    clearTimeout(t);
    t = setTimeout(() => syncDot.classList.remove("syncing"), 700);
  });
</script>
