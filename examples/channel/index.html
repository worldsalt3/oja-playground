<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Channel Pipeline</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@agberohq/oja@latest/build/oja.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0f0f0f;
        color: #e8e8e8;
        font-family: system-ui;
        display: flex;
        justify-content: center;
        padding: 48px 20px;
      }
      .app {
        width: 100%;
        max-width: 520px;
      }
      h1 {
        font-size: 22px;
        margin-bottom: 8px;
      }
      .sub {
        color: #555;
        font-size: 13px;
        margin-bottom: 32px;
      }
      .pipeline {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 32px;
        flex-wrap: wrap;
      }
      .stage {
        padding: 8px 16px;
        border-radius: 8px;
        border: 1px solid #2a2a2a;
        background: #141414;
        font-size: 13px;
        color: #888;
        transition: all 0.3s;
      }
      .stage.active {
        border-color: #4a9a4a;
        background: #0d1f0d;
        color: #4a9a4a;
      }
      .arrow {
        color: #333;
        font-size: 18px;
      }
      .log {
        background: #141414;
        border: 1px solid #1e1e1e;
        border-radius: 12px;
        padding: 16px;
        min-height: 120px;
        font-family: monospace;
        font-size: 12px;
        margin-bottom: 24px;
      }
      .log-line {
        color: #888;
        margin-bottom: 4px;
      }
      .log-line.done {
        color: #4a9a4a;
      }
      .log-line.err {
        color: #e05555;
      }
      button {
        padding: 12px 24px;
        border-radius: 8px;
        border: none;
        background: #e8e8e8;
        color: #0f0f0f;
        font-weight: 600;
        cursor: pointer;
        font-size: 14px;
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <h1>Channel Pipeline</h1>
      <p class="sub">
        producer → channel → process → result. Go-style, in the browser.
      </p>
      <div class="pipeline">
        <div class="stage" id="s1">📤 Send</div>
        <div class="arrow">→</div>
        <div class="stage" id="s2">⚙ Process</div>
        <div class="arrow">→</div>
        <div class="stage" id="s3">✅ Result</div>
      </div>
      <div class="log" id="log">
        <div class="log-line">Ready. Click Run to start the pipeline.</div>
      </div>
      <button id="run">▶ Run Pipeline</button>
    </div>
    <script type="module">
      import { go } from "https://cdn.jsdelivr.net/npm/@agberohq/oja@latest/build/oja.core.esm.js";
      import { Channel } from "https://cdn.jsdelivr.net/npm/@agberohq/oja@latest/build/oja.ext.esm.js";

      const btn = document.getElementById("run");
      const logEl = document.getElementById("log");

      function log(msg, cls = "") {
        const line = document.createElement("div");
        line.className = "log-line " + cls;
        line.textContent = msg;
        logEl.appendChild(line);
        logEl.scrollTop = logEl.scrollHeight;
      }

      function activate(id) {
        document
          .querySelectorAll(".stage")
          .forEach((s) => s.classList.remove("active"));
        if (id) document.getElementById(id).classList.add("active");
      }

      btn.addEventListener("click", async () => {
        btn.disabled = true;
        logEl.innerHTML = "";
        activate(null);

        const jobs = new Channel(3);
        const results = new Channel(3);

        go(async () => {
          for (let i = 1; i <= 5; i++) {
            activate("s1");
            log(`→ sending job ${i}…`);
            await jobs.send(i);
            await new Promise((r) => setTimeout(r, 300));
          }
          jobs.close();
          log("✓ all jobs sent");
        });

        go(async () => {
          for await (const job of jobs) {
            activate("s2");
            log(`⚙ processing job ${job}…`);
            await new Promise((r) => setTimeout(r, 400));
            await results.send({ job, result: job * job });
          }
          results.close();
        });

        go(async () => {
          for await (const { job, result } of results) {
            activate("s3");
            log(`✅ job ${job} → ${result}`, "done");
          }
          activate(null);
          log("Pipeline complete.", "done");
          btn.disabled = false;
        });
      });
    </script>
  </body>
</html>
